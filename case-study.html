      /* Reveal — IntersectionObserver fade+translateY */
      function Reveal({ children, delay = 0 }) {
        const ref = useRef(null);
        const [shown, setShown] = useState(false);
        useEffect(() => {
          const el = ref.current;
          if (!el) return;
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) { setShown(true); obs.unobserve(el); }
              });
            },
            { threshold: 0.12, rootMargin: "0px 0px -8% 0px" }
          );
          obs.observe(el);
          return () => obs.disconnect();
        }, []);
        return (
          <div
            ref={ref}
            style={{
              opacity: shown ? 1 : 0,
              transform: shown ? "translateY(0)" : "translateY(16px)",
              transition: `opacity 700ms cubic-bezier(.2,.7,.2,1) ${delay}ms, transform 700ms cubic-bezier(.2,.7,.2,1) ${delay}ms`,
            }}
          >
            {children}
          </div>
        );
      }

      }

      /* Stat */
      function Stat({ value, label, note, size = "lg", accent = false }) {
        const sizes = { sm: { v: 32, l: 10 }, md: { v: 48, l: 11 }, lg: { v: 72, l: 11 }, xl: { v: 112, l: 12 } };
        const s = sizes[size] || sizes.lg;
        return (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div
              style={{
                fontSize: s.v,
                lineHeight: 0.95,
                letterSpacing: "-0.03em",
                fontWeight: 500,
                color: accent ? "var(--accent)" : "var(--fg)",
                fontFeatureSettings: '"tnum" 1, "ss01" 1',
              }}

                letterSpacing: "0.12em",

              >

              </div>
            )}
          </div>
        );
      }

      /* ViewToggle */
      function ViewToggle({ value, onChange, density = "comfortable" }) {
        return (
          <div
            style={{
              display: "inline-flex",
              background: "rgba(255,255,255,0.04)",
              border: "1px solid rgba(255,255,255,0.08)",
              borderRadius: 999,
              padding: 3,
              fontFamily: "var(--mono)",
              fontSize: 11,
              letterSpacing: "0.08em",
              textTransform: "uppercase",
            }}
          >
            {["full", "skim"].map((mode) => {
              const active = value === mode;
              return (
                <button
                  key={mode}
                  onClick={() => onChange(mode)}
                  style={{
                    padding: density === "compact" ? "5px 12px" : "7px 14px",
                    border: 0,
                    borderRadius: 999,
                    background: active ? "var(--accent)" : "transparent",
                    color: active ? "#0a0a0a" : "rgba(255,255,255,0.6)",
                    cursor: "pointer",
                    fontFamily: "inherit",
                    fontSize: "inherit",
                    letterSpacing: "inherit",
                    textTransform: "inherit",
                    fontWeight: active ? 600 : 400,
                    transition: "background var(--t-fast), color var(--t-fast)",
                  }}
                >
                  {mode}
                </button>
              );
            })}
          </div>
        );
      }

      /* Skim */
      function Skim({ children, when }) {
        if (when !== "skim") return null;
        return (
          <div
            style={{
              padding: "16px 18px",
              background: "rgba(255,255,255,0.02)",
              border: "1px solid rgba(255,255,255,0.06)",
              borderLeft: "2px solid var(--accent)",
              borderRadius: 2,
              fontFamily: "var(--mono)",
              fontSize: 12,
              letterSpacing: "0.02em",
              color: "rgba(255,255,255,0.75)",
              lineHeight: 1.5,
            }}
          >
            {children}
          </div>
        );
      }

      /* PortfolioChrome */
      function PortfolioChrome({ current }) {
        return (
          <header
            style={{
              position: "sticky",
              top: 0,
              zIndex: 50,
              background: "color-mix(in oklab, var(--bg) 80%, transparent)",

              borderBottom: "1px solid rgba(255,255,255,0.06)",
            }}
          >
            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                padding: "14px 32px",
                fontFamily: "var(--mono)",
                fontSize: 11,
                letterSpacing: "0.1em",
                textTransform: "uppercase",
              }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 28 }}>
                <a
                  href="index.html"
                  style={{
                    color: "var(--fg)",
                    textDecoration: "none",
                    fontWeight: 600,
                    fontFamily: "var(--sans)",

                    letterSpacing: "-0.01em",
                    textTransform: "none",
                  }}
                >
                  Jay Arnold
                </a>
                <nav
                  style={{
                    display: "flex",
                    gap: 22,
                    color: "rgba(255,255,255,0.55)",
                    fontFamily: "var(--sans)",
                    fontSize: 14,

                    textTransform: "none",
                  }}
                >
                  <a
                    href="index.html"
                    style={{
                      color: current === "work" ? "var(--fg)" : "inherit",

                      fontWeight: current === "work" ? 500 : 400,
                    }}
                  >
                    Work
                  </a>
                  <a
                    href="about.html"
                    style={{
                      color: current === "about" ? "var(--fg)" : "inherit",
                      textDecoration: "none",
                      fontWeight: current === "about" ? 500 : 400,
                    }}
                  >
                    About
                  </a>
                </nav>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--accent)" }}>
                <span
                  style={{
                    width: 6,
                    height: 6,
                    borderRadius: 999,
                    background: "var(--accent)",
                    boxShadow: "0 0 8px var(--accent)",
                  }}
                />
                Available for work

            </div>
          </header>

      /* NextCaseStudy */
      function NextCaseStudy({ next, density = "comfortable" }) {
        const [hover, setHover] = useState(false);
        const padX = density === "compact" ? 24 : 32;
        const padY = density === "compact" ? 28 : 48;
        return (
          <a
            href={`case-study.html?study=${next.slug}`}
            onMouseEnter={() => setHover(true)}
            onMouseLeave={() => setHover(false)}
            style={{
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              padding: `${padY}px ${padX}px`,
              marginInline: -padX,
              borderTop: "1px solid rgba(255,255,255,0.08)",
              borderBottom: "1px solid rgba(255,255,255,0.08)",
              color: "var(--fg)",
              textDecoration: "none",
              gap: 24,
              background: hover ? "rgba(255,255,255,0.015)" : "transparent",
              transition: "background var(--t-med)",
            }}
          >
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: 11,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  color: hover ? "var(--accent)" : "rgba(255,255,255,0.45)",
                  transition: "color var(--t-fast)",
                }}
              >
                Next case study
              </div>
              <div
                style={{
                  fontSize: density === "compact" ? 32 : 44,
                  lineHeight: 1.05,
                  letterSpacing: "-0.02em",
                  fontWeight: 500,
                  color: hover ? "var(--fg)" : "rgba(255,255,255,0.92)",
                  transition: "color var(--t-fast)",
                }}
              >
                {next.title}
              </div>
            </div>
            <span
              style={{
                fontFamily: "var(--mono)",
                color: hover ? "var(--accent)" : "rgba(255,255,255,0.5)",
                fontSize: 24,
                transform: hover ? "translateX(8px)" : "translateX(0)",
                transition: "transform var(--t-med), color var(--t-fast)",
                display: "inline-block",
              }}
            >
              →
            </span>
          </a>
        );
      }

      /* ContactLinks */

              {items.map(([label, , href, opts]) => (
                <a

      /* SiteFooter */

          <footer

              margin: "0 auto",

            }}

            <div
              style={{
                marginTop: 40,
                display: "flex",
                justifyContent: "space-between",

                gap: 24,
                flexWrap: "wrap",
                fontFamily: "var(--mono)",

                color: "rgba(255,255,255,0.55)",
              }}
            >
              <span>© 2026 Jay Arnold · Durango, CO</span>
              <ContactLinks compact />
            </div>
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
                gap: 24,
                flexWrap: "wrap",
                fontFamily: "var(--mono)",
                fontSize: 10,
                letterSpacing: "0.12em",

      /* ═══════════════════════════════════════════════════════════════════════
         SHARED HELPERS
         ═══════════════════════════════════════════════════════════════════════ */
      function densityScale(d) {
        if (d === "compact") return { padX: 40, heroY: 80, sectionY: 56, gap: 56, h1: 80, h2: 32, h3: 22, lede: 18 };
        return { padX: 56, heroY: 112, sectionY: 76, gap: 72, h1: 104, h2: 38, h3: 24, lede: 20 };
      }

      function textP() {
        return {
          fontSize: 16,
          lineHeight: 1.6,
          color: "rgba(255,255,255,0.78)",
          margin: 0,
          maxWidth: "62ch",
          textWrap: "pretty",
        };
      }

      function nextStudy(slug, all) {
        const keys = Object.keys(all);
        const idx = (keys.indexOf(slug) + 1) % keys.length;
        return all[keys[idx]];
      }

      /* ═══════════════════════════════════════════════════════════════════════
         EDITORIAL LAYOUT
         ═══════════════════════════════════════════════════════════════════════ */

      function HeroAE({ study, D }) {
        return (
          <section
            style={{
              maxWidth: 1240,
              margin: "0 auto",
              padding: `${D.heroY}px ${D.padX}px ${D.heroY * 0.5}px`,
            }}
          >
            <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
              <h1
                style={{
                  fontSize: D.h1,
                  lineHeight: 1.0,
                  letterSpacing: "-0.035em",
                  margin: 0,
                  fontWeight: 500,
                  maxWidth: "16ch",
                }}
              >
                {study.title}
              </h1>
              {study.subtitle && (
                <p
                  style={{
                    fontSize: D.lede,
                    lineHeight: 1.35,
                    margin: 0,
                    color: "rgba(255,255,255,0.65)",
                    maxWidth: "44ch",
                    fontWeight: 400,
                  }}
                >
                  {study.subtitle}
                </p>
              )}
            </div>

            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(4, 1fr)",
                gap: 24,
                marginTop: D.sectionY,
                paddingTop: 32,
                borderTop: "1px solid rgba(255,255,255,0.1)",
              }}
            >
              {[["Role", study.role], ["Team", study.team], ["Year", study.year]].map(([k, v]) => (
                <div key={k} style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  <div
                    style={{
                      fontFamily: "var(--mono)",
                      fontSize: 10,
                      letterSpacing: "0.12em",
                      textTransform: "uppercase",
                      color: "rgba(255,255,255,0.4)",
                    }}
                  >
                    {k}
                  </div>
                  <div style={{ fontSize: 14, color: "rgba(255,255,255,0.85)" }}>{v}</div>
                </div>
              ))}
            </div>

            <div style={{ marginTop: D.sectionY }}>
              <Placeholder src={study.cover} aspect="21/9" label={`${study.title} · hero`} />
            </div>
          </section>
        );
      }

      function Section({ id, index, title, D, total = 5, children }) {
        return (
          <section
            id={id}
            style={{ display: "flex", flexDirection: "column", gap: 28, scrollMarginTop: 80 }}
          >
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <Eyebrow index={index}>{`/ ${String(total).padStart(2, "0")}`}</Eyebrow>
              <h2
                style={{
                  fontSize: D.h2,
                  margin: 0,
                  letterSpacing: "-0.025em",
                  fontWeight: 500,
                }}
              >
                {title}
              </h2>
            </div>
            {children}
          </section>
        );
      }

      function CaseEditorial({ study, all, mode, setMode, density = "compact" }) {
        const D = densityScale(density);
        const H = study.headers || {};
        const sections = [
          { id: "context",  label: H.context  || "Context",  navLabel: H.contextNav  || H.context  || "Context"  },
          { id: "research", label: H.research || "Research", navLabel: H.researchNav || H.research || "Research" },
          { id: "process",  label: H.process  || "Process",  navLabel: H.processNav  || H.process  || "Process"  },
          { id: "screens",  label: H.screens  || "Screens",  navLabel: H.screensNav  || H.screens  || "Screens"  },
          { id: "outcomes", label: H.outcomes || "Outcomes", navLabel: H.outcomesNav || H.outcomes || "Outcomes" },
        ];
        const [active, setActive] = useState("context");

        useEffect(() => {
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => { if (e.isIntersecting) setActive(e.target.id.replace(`-${study.slug}`, "").replace("ed-", "")); });
            },
            { rootMargin: "-30% 0px -55% 0px", threshold: 0 }
          );
          sections.forEach((s) => {
            const el = document.getElementById(`ed-${s.id}-${study.slug}`);
            if (el) obs.observe(el);
          });
          return () => obs.disconnect();
        }, [study.slug]);

        const next = nextStudy(study.slug, all);

        return (
          <article style={{ background: "var(--bg)", color: "var(--fg)", fontFamily: "var(--sans)" }}>
            <PortfolioChrome />
            <HeroAE study={study} D={D} />

            <div
              style={{
                display: "grid",
                gridTemplateColumns: "200px 1fr",
                gap: D.gap,
                maxWidth: 1240,
                margin: "0 auto",
                padding: `0 ${D.padX}px`,
              }}
            >
              {/* Sticky nav */}
              <aside style={{ position: "sticky", top: 80, alignSelf: "start", paddingTop: D.sectionY }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <div style={{ marginBottom: 8 }}>
                    <ViewToggle value={mode} onChange={setMode} density={density} />
                  </div>
                  <Eyebrow>Contents</Eyebrow>
                  <ul style={{ listStyle: "none", padding: 0, margin: 0, display: "flex", flexDirection: "column", gap: 4 }}>
                    {sections.map((s, i) => {
                      const isActive = active === s.id;
                      return (
                        <li key={s.id}>
                          <a
                            href={`#ed-${s.id}-${study.slug}`}
                            style={{
                              display: "flex",
                              alignItems: "center",
                              gap: 10,
                              padding: "6px 0",
                              color: isActive ? "var(--fg)" : "rgba(255,255,255,0.4)",
                              textDecoration: "none",
                              fontSize: 13,
                              transition: "color var(--t-fast)",
                            }}
                          >
                            <span
                              style={{
                                width: isActive ? 18 : 8,
                                height: 1,
                                background: isActive ? "var(--accent)" : "rgba(255,255,255,0.2)",
                                transition: "width var(--t-med), background var(--t-fast)",
                              }}
                            />
                            <span style={{ fontFamily: "var(--mono)", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase" }}>
                              {String(i + 1).padStart(2, "0")} {s.navLabel}
                            </span>
                          </a>
                        </li>
                      );
                    })}
                  </ul>
                </div>
              </aside>

              {/* Body */}
              <main style={{ display: "flex", flexDirection: "column", gap: D.sectionY * 1.4 }}>
                {/* CONTEXT */}
                <Section id={`ed-context-${study.slug}`} index={1} title={sections[0].label} D={D}>
                  <Skim when={mode}>{study.context}</Skim>
                  {mode === "full" && (
                    <>
                      {(study.contextLong || study.context).split(/\n\n+/).map((para, i) => (
                        <p key={i} style={textP()}>{para}</p>
                      ))}
                    </>
                  )}
                </Section>

                {/* RESEARCH */}
                <Section id={`ed-research-${study.slug}`} index={2} title={sections[1].label} D={D}>
                  {study.researchSkim && <Skim when={mode}>{study.researchSkim}</Skim>}
                  {mode === "full" && (
                    <>
                      {study.research && study.research.length > 0 && (
                        <div
                          style={{
                            display: "grid",
                            gridTemplateColumns: "repeat(4, 1fr)",
                            gap: 24,
                            padding: "28px 0",
                            borderTop: "1px solid rgba(255,255,255,0.08)",
                            borderBottom: "1px solid rgba(255,255,255,0.08)",
                          }}
                        >
                          {study.research.map((r) => (
                            <Stat key={r.label} value={r.value} label={r.label} size="md" />
                          ))}
                        </div>
                      )}
                      <p style={textP()}>{study.researchNarrative}</p>
                    </>
                  )}
                  {study.researchImage && (
                    <Reveal>
                      <Placeholder src={study.researchImage} aspect="16/9" label="Research" />
                    </Reveal>
                  )}
                </Section>

                {/* PROCESS */}
                <Section id={`ed-process-${study.slug}`} index={3} title={sections[2].label} D={D}>
                  <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                    {study.process.map((p, i) => (
                      <Reveal key={p.phase} delay={i * 60}>
                        <div
                          style={{
                            display: "grid",
                            gridTemplateColumns: "120px 1fr",
                            gap: 24,
                            padding: "28px 0",
                            borderTop: i === 0 ? "1px solid rgba(255,255,255,0.08)" : "none",
                            borderBottom: "1px solid rgba(255,255,255,0.08)",
                          }}
                        >
                          <div
                            style={{
                              fontFamily: "var(--mono)",
                              fontSize: 11,
                              letterSpacing: "0.1em",
                              textTransform: "uppercase",
                              color: "var(--accent)",
                              paddingTop: 6,
                            }}
                          >
                            {String(i + 1).padStart(2, "0")} · {p.phase}
                          </div>
                          <div>
                            <h3
                              style={{
                                fontSize: D.h3,
                                letterSpacing: "-0.015em",
                                margin: "0 0 12px",
                                fontWeight: 500,
                              }}
                            >
                              {p.title}
                            </h3>
                            {mode === "full" && (
                              <p style={{ ...textP(), color: "rgba(255,255,255,0.65)", margin: 0 }}>
                                {p.body}
                              </p>
                            )}
                          </div>
                        </div>
                      </Reveal>
                    ))}
                  </div>
                </Section>

                {/* PULL QUOTE */}
                <Reveal>
                  <div
                    style={{
                      padding: `${D.sectionY * 0.6}px 0`,
                      borderTop: "1px solid rgba(255,255,255,0.08)",
                      borderBottom: "1px solid rgba(255,255,255,0.08)",
                    }}
                  >
                    <div
                      style={{
                        fontSize: D.h2 * 0.85,
                        lineHeight: 1.2,
                        letterSpacing: "-0.02em",
                        fontWeight: 400,
                        fontStyle: "italic",
                        color: "var(--fg)",
                      }}
                    >
                      <span style={{ color: "var(--accent)", marginRight: 8 }}>"</span>
                      {study.pull}
                    </div>
                  </div>
                </Reveal>

                {/* SCREENS */}
                <Section id={`ed-screens-${study.slug}`} index={4} title={sections[3].label} D={D}>
                  <div style={{ display: "flex", flexDirection: "column", gap: 40 }}>
                    {study.screens.map((s, i) => (
                      <Reveal key={s.label} delay={i * 50}>
                        <figure style={{ margin: 0, display: "flex", flexDirection: "column", gap: 16 }}>
                          <Placeholder
                            label={s.label}
                            src={s.src}
                            aspect={s.aspect}
                            fit={s.fit}
                            frame={s.frame}
                            hint={s.src ? null : `screen ${String(i + 1).padStart(2, "0")}`}
                          />
                          {s.caption && (
                            <figcaption style={{ paddingLeft: 2, maxWidth: "62ch" }}>
                              <p
                                style={{
                                  margin: 0,
                                  fontSize: 15,
                                  lineHeight: 1.55,
                                  color: "rgba(255,255,255,0.65)",
                                  textWrap: "pretty",
                                }}
                              >
                                {s.caption}
                              </p>
                            </figcaption>
                          )}
                        </figure>
                      </Reveal>
                    ))}
                  </div>
                </Section>

                {/* OUTCOMES */}
                <Section id={`ed-outcomes-${study.slug}`} index={5} title={sections[4].label} D={D}>
                  <div
                    style={{
                      display: "grid",
                      gridTemplateColumns: "repeat(2, 1fr)",
                      gap: 48,
                      padding: "32px 0",
                      borderTop: "1px solid rgba(255,255,255,0.08)",
                      borderBottom: "1px solid rgba(255,255,255,0.08)",
                    }}
                  >
                    {study.metrics.map((m, i) => (
                      <Reveal key={m.label} delay={i * 80}>
                        <Stat value={m.value} label={m.label} note={m.note} size="lg" accent={i === 0} />
                      </Reveal>
                    ))}
                  </div>
                </Section>

                <div style={{ marginTop: D.sectionY }}>
                  <NextCaseStudy next={next} density={density} />
                </div>
              </main>
            </div>

            <SiteFooter maxWidth={1240} />
          </article>
        );
      }

      /* ═══════════════════════════════════════════════════════════════════════
         PAYMENTS LAYOUT
         ═══════════════════════════════════════════════════════════════════════ */

      function BeforeAfter({ imp, view, setView }) {
        const isBefore = view === "before";
        const label = isBefore ? imp.beforeLabel : imp.afterLabel;
        const src = isBefore ? imp.beforeSrc : imp.afterSrc;

        return (
          <figure style={{ margin: 0, display: "flex", flexDirection: "column", gap: 16 }}>
            {/* Toggle row */}
            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                gap: 16,
                flexWrap: "wrap",
              }}
            >
              <div
                style={{
                  display: "inline-flex",
                  background: "rgba(255,255,255,0.04)",
                  border: "1px solid rgba(255,255,255,0.08)",
                  borderRadius: 999,
                  padding: 3,
                  fontFamily: "var(--mono)",
                  fontSize: 11,
                  letterSpacing: "0.08em",
                  textTransform: "uppercase",
                }}
              >
                {["before", "after"].map((v) => {
                  const active = view === v;
                  return (
                    <button
                      key={v}
                      onClick={() => setView(v)}
                      style={{
                        padding: "7px 16px",
                        border: 0,
                        borderRadius: 999,
                        background: active ? "var(--accent)" : "transparent",
                        color: active ? "#0a0a0a" : "rgba(255,255,255,0.6)",
                        cursor: "pointer",
                        fontFamily: "inherit",
                        fontSize: "inherit",
                        letterSpacing: "inherit",
                        textTransform: "inherit",
                        fontWeight: active ? 600 : 400,
                        transition: "background var(--t-fast), color var(--t-fast)",
                        display: "inline-flex",
                        alignItems: "center",
                        gap: 8,
                      }}
                    >
                      <span
                        style={{
                          width: 5,
                          height: 5,
                          borderRadius: 999,
                          background: active ? "#0a0a0a" : "rgba(255,255,255,0.4)",
                        }}
                      />
                      {v}
                    </button>
                  );
                })}
              </div>
              <div
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: 10,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  color: "rgba(255,255,255,0.45)",
                }}
              >
                {isBefore ? "Original design" : "Shipped design"}
              </div>
            </div>

            {/* Stage */}
            <div
              style={{
                position: "relative",
                width: "100%",
                aspectRatio: "16/10",
                borderRadius: 4,
                overflow: "hidden",
              }}
            >
              {["before", "after"].map((v) => {
                const visible = view === v;
                const vSrc = v === "before" ? imp.beforeSrc : imp.afterSrc;
                const vLabel = v === "before" ? imp.beforeLabel : imp.afterLabel;
                const vHint = v === "before" ? imp.beforeHint : imp.afterHint;
                return (
                  <div
                    key={v}
                    style={{
                      position: "absolute",
                      inset: 0,
                      opacity: visible ? 1 : 0,
                      transform: visible ? "scale(1)" : "scale(0.995)",
                      transition: "opacity 380ms cubic-bezier(.2,.7,.2,1), transform 380ms cubic-bezier(.2,.7,.2,1)",
                      pointerEvents: visible ? "auto" : "none",
                    }}
                  >
                    <Placeholder label={vLabel} aspect="16/10" hint={vHint} src={vSrc} />
                  </div>
                );
              })}
            </div>

            <figcaption style={{ paddingLeft: 2, maxWidth: "62ch" }}>
              <p style={{ margin: 0, fontSize: 15, lineHeight: 1.55, color: "rgba(255,255,255,0.65)", textWrap: "pretty" }}>
                {label}
              </p>
            </figcaption>
          </figure>
        );
      }

      function ImprovementBlock({ imp, index, total, D, mode, study }) {
        const [view, setView] = useState("after");

        return (
          <section
            id={`pay-imp-${imp.slug}-${study.slug}`}
            style={{ display: "flex", flexDirection: "column", gap: 32, scrollMarginTop: 80 }}
          >
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <Eyebrow index={index + 1}>{`/ ${String(total).padStart(2, "0")}`}</Eyebrow>
              <div style={{ display: "flex", alignItems: "baseline", gap: 18, flexWrap: "wrap" }}>
                <h2 style={{ fontSize: D.h2, margin: 0, letterSpacing: "-0.025em", fontWeight: 500 }}>
                  {imp.name}
                </h2>
                <span
                  style={{
                    fontFamily: "var(--mono)",
                    fontSize: 11,
                    letterSpacing: "0.12em",
                    textTransform: "uppercase",
                    color: "var(--accent)",
                  }}
                >
                  {imp.kicker}
                </span>
              </div>
              <p style={{ margin: 0, fontSize: D.lede * 0.9, lineHeight: 1.4, color: "rgba(255,255,255,0.7)", maxWidth: "52ch", fontWeight: 400 }}>
                {imp.oneLiner}
              </p>
            </div>

            {mode === "full" && (
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "1fr 1fr",
                  gap: 0,
                  borderTop: "1px solid rgba(255,255,255,0.08)",
                  borderBottom: "1px solid rgba(255,255,255,0.08)",
                }}
              >
                {[["Problem", imp.problem], ["Approach", imp.approach]].map(([label, body], i) => (
                  <div
                    key={label}
                    style={{
                      padding: "28px 28px 28px 0",
                      paddingLeft: i === 0 ? 0 : 28,
                      borderLeft: i === 0 ? "none" : "1px solid rgba(255,255,255,0.06)",
                      display: "flex",
                      flexDirection: "column",
                      gap: 14,
                    }}
                  >
                    <div
                      style={{
                        fontFamily: "var(--mono)",
                        fontSize: 11,
                        letterSpacing: "0.12em",
                        textTransform: "uppercase",
                        color: i === 0 ? "rgba(255,255,255,0.45)" : "var(--accent)",
                      }}
                    >
                      {label}
                    </div>
                    <p style={{ margin: 0, fontSize: 16, lineHeight: 1.6, color: "rgba(255,255,255,0.78)", maxWidth: "48ch", textWrap: "pretty" }}>
                      {body}
                    </p>
                  </div>
                ))}
              </div>
            )}

            <Reveal>
              <BeforeAfter imp={imp} view={view} setView={setView} D={D} />
            </Reveal>

            {imp.outcome && mode === "full" && (
              <Reveal>
                <div style={{ display: "flex", gap: 14, alignItems: "flex-start", padding: "20px 0 4px" }}>
                  <span
                    style={{
                      fontFamily: "var(--mono)",
                      fontSize: 10,
                      letterSpacing: "0.14em",
                      textTransform: "uppercase",
                      color: "var(--accent)",
                      paddingTop: 4,
                      minWidth: 78,
                    }}
                  >
                    Outcome
                  </span>
                  <p style={{ margin: 0, fontSize: 17, lineHeight: 1.5, color: "var(--fg)", letterSpacing: "-0.005em", maxWidth: "52ch", textWrap: "pretty" }}>
                    {imp.outcome}
                  </p>
                </div>
              </Reveal>
            )}
          </section>
        );
      }

      function HeroP({ study, D, improvements }) {
        return (
          <section
            style={{
              maxWidth: 1240,
              margin: "0 auto",
              padding: `${D.heroY}px ${D.padX}px ${D.heroY * 0.5}px`,
            }}
          >
            <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
              <h1
                style={{
                  fontSize: D.h1,
                  lineHeight: 1.0,
                  letterSpacing: "-0.035em",
                  margin: 0,
                  fontWeight: 500,
                  maxWidth: "16ch",
                }}
              >
                {study.title}
              </h1>
              {study.subtitle && (
                <p style={{ fontSize: D.lede, lineHeight: 1.35, margin: 0, color: "rgba(255,255,255,0.65)", maxWidth: "44ch", fontWeight: 400 }}>
                  {study.subtitle}
                </p>
              )}
            </div>

            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(4, 1fr)",
                gap: 24,
                marginTop: D.sectionY,
                paddingTop: 32,
                borderTop: "1px solid rgba(255,255,255,0.1)",
              }}
            >
              {[
                ["Role", study.role],
                ["Team", study.team],
                ["Year", study.year],
                ["Shipped", String(improvements.length) + " improvements"],
              ].map(([k, v]) => (
                <div key={k} style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  <div
                    style={{
                      fontFamily: "var(--mono)",
                      fontSize: 10,
                      letterSpacing: "0.12em",
                      textTransform: "uppercase",
                      color: "rgba(255,255,255,0.4)",
                    }}
                  >
                    {k}
                  </div>
                  <div style={{ fontSize: 14, color: "rgba(255,255,255,0.85)" }}>{v}</div>
                </div>
              ))}
            </div>
          </section>
        );
      }

      function CasePayments({ study, all, mode, setMode, density = "compact" }) {
        const D = densityScale(density);
        const improvements = study.improvements || [];
        const sections = [
          { id: "intro", label: "The Approach" },
          ...improvements.map((imp, i) => ({ id: `imp-${imp.slug}`, label: imp.name, index: i + 1 })),
          { id: "throughline", label: "Throughline" },
          { id: "outcomes", label: "Outcomes" },
        ];
        const [active, setActive] = useState("intro");

        useEffect(() => {
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => { if (e.isIntersecting) setActive(e.target.id.replace(`pay-`, "").replace(`-${study.slug}`, "")); });
            },
            { rootMargin: "-30% 0px -55% 0px", threshold: 0 }
          );
          sections.forEach((s) => {
            const el = document.getElementById(`pay-${s.id}-${study.slug}`);
            if (el) obs.observe(el);
          });
          return () => obs.disconnect();
        }, [study.slug, improvements.length]);

        const next = nextStudy(study.slug, all);

        return (
          <article style={{ background: "var(--bg)", color: "var(--fg)", fontFamily: "var(--sans)" }}>
            <PortfolioChrome />
            <HeroP study={study} D={D} improvements={improvements} />

            <div
              style={{
                display: "grid",
                gridTemplateColumns: "200px 1fr",
                gap: D.gap,
                maxWidth: 1240,
                margin: "0 auto",
                padding: `0 ${D.padX}px`,
              }}
            >
              {/* Sticky nav */}
              <aside style={{ position: "sticky", top: 80, alignSelf: "start", paddingTop: D.sectionY }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <div style={{ marginBottom: 8 }}>
                    <ViewToggle value={mode} onChange={setMode} density={density} />
                  </div>
                  <Eyebrow>Contents</Eyebrow>
                  <ul style={{ listStyle: "none", padding: 0, margin: 0, display: "flex", flexDirection: "column", gap: 4 }}>
                    {sections.map((s, i) => {
                      const isActive = active === s.id;
                      return (
                        <li key={s.id}>
                          <a
                            href={`#pay-${s.id}-${study.slug}`}
                            style={{
                              display: "flex",
                              alignItems: "center",
                              gap: 10,
                              padding: "6px 0",
                              color: isActive ? "var(--fg)" : "rgba(255,255,255,0.4)",
                              textDecoration: "none",
                              fontSize: 13,
                              transition: "color var(--t-fast)",
                            }}
                          >
                            <span
                              style={{
                                width: isActive ? 18 : 8,
                                height: 1,
                                background: isActive ? "var(--accent)" : "rgba(255,255,255,0.2)",
                                transition: "width var(--t-med), background var(--t-fast)",
                              }}
                            />
                            <span style={{ fontFamily: "var(--mono)", fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase" }}>
                              {String(i + 1).padStart(2, "0")} {s.label}
                            </span>
                          </a>
                        </li>
                      );
                    })}
                  </ul>
                </div>
              </aside>

              {/* Body */}
              <main style={{ display: "flex", flexDirection: "column", gap: D.sectionY * 1.4 }}>
                {/* INTRO */}
                <section
                  id={`pay-intro-${study.slug}`}
                  style={{ display: "flex", flexDirection: "column", gap: 28, scrollMarginTop: 80 }}
                >
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    <Eyebrow index={1}>{`/ ${String(sections.length).padStart(2, "0")}`}</Eyebrow>
                    <h2 style={{ fontSize: D.h2, margin: 0, letterSpacing: "-0.025em", fontWeight: 500 }}>
                      {sections[0].label}
                    </h2>
                  </div>
                  <Skim when={mode}>{study.context}</Skim>
                  {mode === "full" && (
                    <>
                      {(study.contextLong || study.context).split(/\n\n+/).map((para, i) => (
                        <p key={i} style={textP()}>{para}</p>
                      ))}
                    </>
                  )}
                </section>

                {/* IMPROVEMENTS */}
                {improvements.map((imp, i) => (
                  <ImprovementBlock
                    key={imp.slug}
                    imp={imp}
                    index={i + 1}
                    total={sections.length}
                    D={D}
                    mode={mode}
                    study={study}
                  />
                ))}

                {/* THROUGHLINE */}
                <section
                  id={`pay-throughline-${study.slug}`}
                  style={{ display: "flex", flexDirection: "column", gap: 28, scrollMarginTop: 80 }}
                >
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    <Eyebrow index={improvements.length + 2}>{`/ ${String(sections.length).padStart(2, "0")}`}</Eyebrow>
                    <h2 style={{ fontSize: D.h2, margin: 0, letterSpacing: "-0.025em", fontWeight: 500 }}>
                      Throughline
                    </h2>
                  </div>
                  <Reveal>
                    <div
                      style={{
                        padding: `${D.sectionY * 0.6}px 0`,
                        borderTop: "1px solid rgba(255,255,255,0.08)",
                        borderBottom: "1px solid rgba(255,255,255,0.08)",
                      }}
                    >
                      <div
                        style={{
                          fontSize: D.h2 * 0.85,
                          lineHeight: 1.2,
                          letterSpacing: "-0.02em",
                          fontWeight: 400,
                          fontStyle: "italic",
                          color: "var(--fg)",
                        }}
                      >
                        <span style={{ color: "var(--accent)", marginRight: 8 }}>"</span>
                        {study.pull}
                      </div>
                    </div>
                  </Reveal>
                  {mode === "full" && (
                    <p style={textP()}>
                      Same approach in both. Look for places where the interface is asking the user to do work the software could do instead, and fix them. Iterative work like this is where the product starts to feel like it's actually on the user's side.
                    </p>
                  )}
                </section>

                {/* OUTCOMES */}
                <section
                  id={`pay-outcomes-${study.slug}`}
                  style={{ display: "flex", flexDirection: "column", gap: 28, scrollMarginTop: 80 }}
                >
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    <Eyebrow index={improvements.length + 3}>{`/ ${String(sections.length).padStart(2, "0")}`}</Eyebrow>
                    <h2 style={{ fontSize: D.h2, margin: 0, letterSpacing: "-0.025em", fontWeight: 500 }}>
                      Outcomes
                    </h2>
                  </div>
                  <div
                    style={{
                      display: "grid",
                      gridTemplateColumns: "repeat(2, 1fr)",
                      gap: 48,
                      padding: "32px 0",
                      borderTop: "1px solid rgba(255,255,255,0.08)",
                      borderBottom: "1px solid rgba(255,255,255,0.08)",
                    }}
                  >
                    {study.metrics.map((m, i) => (
                      <Reveal key={m.label} delay={i * 80}>
                        <Stat value={m.value} label={m.label} note={m.note} size="lg" accent={i === 0} />
                      </Reveal>
                    ))}
                  </div>
                </section>

                <div style={{ marginTop: D.sectionY }}>
                  <NextCaseStudy next={next} density={density} />
                </div>
              </main>
            </div>

            <SiteFooter maxWidth={1240} />
          </article>
        );
      }

      /* ═══════════════════════════════════════════════════════════════════════
         APP + MOUNT
         ═══════════════════════════════════════════════════════════════════════ */
      const slug = new URLSearchParams(window.location.search).get("study") || "collaborative";
      const study = CASE_STUDIES[slug] || CASE_STUDIES.collaborative;

      function App() {
        const [mode, setMode] = useState("full");

        useEffect(() => {
          document.title = `Jay Arnold · ${study.title}`;
        }, []);

        if (study.layout === "payments") {
          return (
            <CasePayments
              study={study}
              all={CASE_STUDIES}
              mode={mode}
              setMode={setMode}
            />
          );
        }
        return (
          <CaseEditorial
            study={study}
            all={CASE_STUDIES}
            mode={mode}
            setMode={setMode}
          />
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
