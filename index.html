      /* ───────────────────────────────────────────────────────────────────
         Reveal — fades + translates in on intersection
         ─────────────────────────────────────────────────────────────────── */
      function Reveal({ children, delay = 0, y = 16 }) {
        const ref = useRef(null);
        const [shown, setShown] = useState(false);
        useEffect(() => {
          const el = ref.current;
          if (!el) return;
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) { setShown(true); obs.unobserve(el); }
              });
            },
            { threshold: 0.12, rootMargin: "0px 0px -8% 0px" }
          );
          obs.observe(el);
          return () => obs.disconnect();
        }, []);
        return (
          <div
            ref={ref}
            style={{
              opacity: shown ? 1 : 0,
              transform: shown ? "translateY(0)" : `translateY(${y}px)`,
              transition: `opacity 700ms cubic-bezier(.2,.7,.2,1) ${delay}ms, transform 700ms cubic-bezier(.2,.7,.2,1) ${delay}ms`,
            }}
          >
            {children}
          </div>
        );
      }

      /* ───────────────────────────────────────────────────────────────────
         Eyebrow — monospace label, optionally accent-colored
         ─────────────────────────────────────────────────────────────────── */
      function Eyebrow({ children, accent }) {
        return (

            }}

          </div>
        );
      }

      /* ───────────────────────────────────────────────────────────────────
         Placeholder — striped SVG stand-in or real image
         ─────────────────────────────────────────────────────────────────── */
      function Placeholder({ label, aspect = "16/9", style, hint, src }) {

                alt={label || ""}
                loading="lazy"

                  inset: 0,
                  width: "100%",
                  height: "100%",
                  objectFit: "cover",
                  objectPosition: "center top",
                  display: "block",
                }}
              />
            </div>
          );
        }
        const stripe = "rgba(255,255,255,0.025)";
        const stripeAlt = "rgba(255,255,255,0.012)";
        return (
          <div
            style={{
              aspectRatio: aspect,
              width: "100%",
              position: "relative",
              background: `repeating-linear-gradient(135deg, ${stripe} 0 1px, ${stripeAlt} 1px 9px)`,

                {hint && <div style={{ opacity: 0.55 }}>{hint}</div>}

        );
      }
